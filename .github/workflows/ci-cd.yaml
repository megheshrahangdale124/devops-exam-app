name: CI/CD Pipeline python workflow
on: push
  # branches:
  #   - feat/cicd
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v2
      - name: Set up Python 3.8
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: dist/*
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: display
        run: echo "Scanning for vulnerabilities..."
  docker :
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v2
      - name: Set up Python 3.8
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: build docker image
        run: docker image build -t ${{ secrets.DOCKER_USERNAME }}/python-app:${{ github.run_number }} .
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/python-app:${{ github.run_number }} 
        # if you want to push the image to dockerhub  
      # then you can uncomment the above code and push the image to dockerhub