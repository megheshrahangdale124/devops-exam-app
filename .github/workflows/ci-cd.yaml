name: CI/CD Pipeline (Python + Docker + Compose)

on:
  push:
    branches:
      - feat/cicd
      - main

jobs:

  # ------------------ BUILD & TEST ------------------
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: Install Dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run Tests
        working-directory: backend
        run: pytest tests/ || echo "No tests found"

      # - name: Run Trivy File System Scan
      #   run: |
      #     sudo apt-get install wget -y
      #     wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.44.1_Linux-64bit.deb
      #     sudo dpkg -i trivy_0.44.1_Linux-64bit.deb
      #     trivy fs --security-checks vuln,config --format table -o trivy-fs-report.html backend

      # - name: Upload Trivy Report
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: trivy-fs-report
      #     path: trivy-fs-report.html

  # ------------------ DOCKER BUILD & DEPLOY ------------------
  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          cd backend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/python-app:${{ github.run_number }} .

      - name: Deploy with Docker Compose
        run: |
          docker compose down --remove-orphans || true
          docker compose up -d --build

          echo "⏳ Waiting for MySQL to initialize..."
          timeout 120 bash -c '
            while ! docker compose exec -T mysql mysqladmin ping -uroot -prootpass --silent; do
              sleep 5
              docker compose logs mysql --tail=5 || true
            done
          '
          sleep 10

      

      - name: push image to dockerhub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/python-app:${{ github.run_number }} 
        # if you want to push the image to dockerhub then you can uncomment the above code and push the image to dockerhub
      - name: Verify Deployment
        run: |
          echo "=== Container Status ==="
          docker compose ps -a

          echo "=== Testing Flask Endpoint ==="
          curl -I http://localhost:5000 || true