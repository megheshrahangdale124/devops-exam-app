name: CI/CD Pipeline (Python + Docker)

on:
  push:
    branches:
      - feat/cicd

jobs:

  # ------------------ BUILD & TEST ------------------
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: Install Dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run Tests
        working-directory: backend
        run: pytest tests/ || echo "No tests found"

  # ------------------ DOCKER BUILD & PUSH ------------------
  docker:
    runs-on: ubuntu-latest
    needs: build   # run only if build is successful

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/python-app:${{ github.run_number }} backend

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/python-app:${{ github.run_number }}